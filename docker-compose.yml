services:
  redis:
    image: redis:7-alpine
    container_name: nxlyr_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec
    env_file:
      - /mnt/secrets/.env

volumes:
  redis_data:
