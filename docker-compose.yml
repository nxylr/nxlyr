services:
  redis:
    image: redis:7-alpine
    container_name: nxlyr_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec
    env_file:
      - .env

  # Placeholder — will be built out in Phase 1
  api:
    build: ./api
    container_name: nxlyr_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    profiles:
      - full

volumes:
  redis_data:
