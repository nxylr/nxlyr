name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Lint /api
        run: ruff check api/ --ignore E501 || true

  lint-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dashboard folder exists
        run: ls dashboard/